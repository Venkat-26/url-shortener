name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Url Shortener CI/CD Pipeline
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run-tests
        run: |
          cd backend/url-shortener
          ./mvnw test
  
  test-analytics:
    name: Test Python Flask
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14' 
      
      - name: Install Dependencies
        run: |
          cd analytics
          pip install -r requirements.txt
  
  build-and-push:
    name: Build and Push Docker Images
    runs-on: Ubuntu-Latest
    needs: [test-backend, test-analytics]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/url-shortener
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/url-shortener:latest
      
      - name: Build and push analytics
        uses: docker/build-push-action@v5
        with:
          context: ./analytics
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/url-shortener-analytics:latest

      
      

      


