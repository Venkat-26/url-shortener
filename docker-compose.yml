version: "3.8"

services:  
  postgres:
    image: postgres:15-alphine
    container_name: postgres-db
    environment: 
      POSTGRES_DB: "UrlShortener"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: 2444666668888888
    ports: 
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD","pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  backend:
    build: ./backend/url-shortener
    container_name: spring-boot-app
    ports: 
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/UrlShortener
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 2444666668888888
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: my-super-secret-key-for-url-shortener-app-2026
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      
  analytics:
    build: ./analytics
    container_name: python_analytics
    ports: 
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_port: 5432
      DB_NAME: UrlShortener
      DB_USER: postgres
      DB_PASSWORD: 2444666668888888
      FLASK_PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy

volumes: 
  postgres_data:
      

